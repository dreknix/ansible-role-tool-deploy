---
dive_version: 0.13.1

tool_deploy_default_config_dive:
  dive:
    action: download_archive
    github:
      repo: wagoodman/dive
      file: "v{{ dive_version | mandatory }}/dive_{{ dive_version }}_linux_{{'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}.tar.gz"
    version:
      args: --version
      match: "dive {{ dive_version | mandatory }}"
...
