---
docker_credential_version: 0.9.4

tool_deploy_default_config_docker_credential_pass:
  docker-credential-pass:
    action: download_binary
    github:
      repo: docker/docker-credential-helpers
      file: "v{{ docker_credential_version | mandatory }}/docker-credential-pass-v{{ docker_credential_version }}.linux-{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
    version:
      args: --version
      match: "v{{ docker_credential_version | mandatory }}"
...
