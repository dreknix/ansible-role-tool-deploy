---
gitleaks_version: 8.30.1

tool_deploy_default_config_gitleaks:
  gitleaks:
    action: download_archive
    github:
      repo: gitleaks/gitleaks
      file: "v{{ gitleaks_version }}/gitleaks_{{ gitleaks_version }}_linux_{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'x64' }}.tar.gz"
    version:
      args: --version
      match: "gitleaks version {{ gitleaks_version | mandatory }}"
    bash_completion:
      generate_cmd: gitleaks completion bash
    zsh_completion:
      generate_cmd: gitleaks completion zsh
...
