---
gopass_jsonapi_version: 1.16.1

tool_deploy_default_config_gopass_jsonapi:
  gopass-jsonapi:
    action: download_archive
    github:
      repo: gopasspw/gopass-jsonapi
      file: "v{{ gopass_jsonapi_version | mandatory }}/gopass-jsonapi-{{ gopass_jsonapi_version }}-linux-{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}.tar.gz"
    version:
      args: version
      match: "gopass-jsonapi version {{ gopass_jsonapi_version | mandatory }}"
...
