---
hadolint_version: 2.14.0

tool_deploy_default_config_hadolint:
  hadolint:
    action: download_binary
    github:
      repo: hadolint/hadolint
      file: "v{{ hadolint_version | mandatory }}/hadolint-Linux-{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'x86_64' }}"
    version:
      args: --version
      match: "Haskell Dockerfile Linter {{ hadolint_version | mandatory }}"
...
