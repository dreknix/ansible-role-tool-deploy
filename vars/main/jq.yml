---
jq_version: 1.8.2

tool_deploy_default_config_jq:
  jq:
    action: download_binary
    github:
      repo: jqlang/jq
      file: >-
        jq-{{ jq_version | mandatory }}/jq-linux-{{ "arm64" if
        ansible_facts["architecture"] == "aarch64" else "amd64" }}
    version:
      args: --version
      match: "jq-{{ jq_version | mandatory }}"
...
