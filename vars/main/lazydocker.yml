---
lazydocker_version: 0.25.2

tool_deploy_default_config_lazydocker:
  lazydocker:
    action: download_archive
    github:
      repo: jesseduffield/lazydocker
      file: "v{{ lazydocker_version | mandatory }}/lazydocker_{{ lazydocker_version }}_Linux_{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'x86_64' }}.tar.gz"
    version:
      args: --version
      match: "Version: {{ lazydocker_version | mandatory }}"
...
