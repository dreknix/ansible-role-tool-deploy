---
lazygit_version: 0.62.2

tool_deploy_default_config_lazygit:
  lazygit:
    action: download_archive
    github:
      repo: jesseduffield/lazygit
      file: "v{{ lazygit_version | mandatory }}/lazygit_{{ lazygit_version }}_Linux_{{ ansible_facts['architecture'] }}.tar.gz"
    version:
      args: --version
      match: "version={{ lazygit_version | mandatory }}"
...
