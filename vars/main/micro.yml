---
micro_version: 2.0.15

tool_deploy_default_config_micro:
  micro:
    action: download_archive
    github:
      repo: zyedidia/micro
      file: "v{{ micro_version | mandatory }}/micro-{{ micro_version | mandatory }}-linux{{ '-arm64' if ansible_facts['architecture'] == 'aarch64' else '64-static' }}.tar.gz"
    version:
      args: --version
      match: "Version: {{ micro_version | mandatory }}"
...
