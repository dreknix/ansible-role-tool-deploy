---
minijinja_version: 2.20.0

tool_deploy_default_config_minijinja:
  minijinja-cli:
    action: download_archive
    github:
      repo: mitsuhiko/minijinja
      file: "{{ minijinja_version | mandatory }}/minijinja-cli-{{ ansible_facts['architecture'] }}-unknown-linux-gnu.tar.xz"
    version:
      args: --version
      match: "{{ minijinja_version | mandatory }}"
    bash_completion:
      generate_args: --generate-completion bash
    zsh_completion:
      generate_args: --generate-completion zsh
...
