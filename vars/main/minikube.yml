---
minikube_version: 1.37.0

tool_deploy_default_config_minikube:
  minikube:
    action: download_binary
    github:
      repo: kubernetes/minikube
      file: "v{{ minikube_version | mandatory }}/minikube-linux-{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
    version:
      args: version
      match: "minikube version: v{{ minikube_version | mandatory }}"
    bash_completion:
      generate_args: completion bash
    zsh_completion:
      generate_args: completion zsh
...
