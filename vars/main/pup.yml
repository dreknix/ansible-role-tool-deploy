---
pup_version: 0.4.2

tool_deploy_default_config_pup:
  pup:
    action: download_archive
    github:
      repo: gromgit/pup
      file: "v{{ pup_version | mandatory }}/pup_linux_{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}.tar.gz"
    version:
      args: --version
      match: "{{ pup_version | mandatory }}"
...
