---
ruff_version: 0.15.16

tool_deploy_default_config_ruff:
  ruff:
    action: download_archive
    github:
      repo: astral-sh/ruff
      file: "{{ ruff_version | mandatory }}/ruff-{{ ansible_facts['architecture'] }}-unknown-linux-gnu.tar.gz"
    version:
      args: --version
      match: "ruff {{ ruff_version | mandatory }}"
...
