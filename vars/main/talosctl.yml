---
talosctl_version: 1.11.5

tool_deploy_default_config_talosctl:
  talosctl:
    action: download_binary
    github:
      repo: siderolabs/talos
      file: "v{{ talosctl_version | mandatory }}/talosctl-linux-{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
    version:
      args: version --client
      match: "{{ talosctl_version | mandatory }}"
    bash_completion:
      generate_args: completion bash
    zsh_completion:
      generate_args: completion zsh
...
