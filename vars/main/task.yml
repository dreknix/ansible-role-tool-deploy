---
task_version: 3.51.1

tool_deploy_default_config_task:
  task:
    action: download_archive
    github:
      repo: go-task/task
      file: "v{{ task_version | mandatory }}/task_linux_{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}.tar.gz"
    version:
      args: --version
      match: "{{ task_version | mandatory }}"
    bash_completion:
      src: "completion/bash/task.bash"
    zsh_completion:
      src: "completion/zsh/_task"
...
