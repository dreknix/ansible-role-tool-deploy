---
uv_version: 0.11.25

tool_deploy_default_config_uv:
  uv:
    action: download_archive
    github:
      repo: astral-sh/uv
      file: "{{ uv_version | mandatory }}/uv-{{ ansible_facts['architecture']
        }}-unknown-linux-gnu.tar.gz"
    version:
      args: --version
      match: "uv {{ uv_version | mandatory }}"
    copy_files:
      - src: uvx
        mode: u=rwx,go=rx
...
