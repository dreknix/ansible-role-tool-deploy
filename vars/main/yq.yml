---
yq_version: 4.53.3

tool_deploy_default_config_yq:
  yq:
    action: download_binary
    github:
      repo: mikefarah/yq
      file: "v{{ yq_version | mandatory }}/yq_linux_{{ 'arm64' if
        ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
    version:
      args: --version
      match: "version v{{ yq_version | mandatory }}"
...
